name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Warm health endpoint
        run: curl -fsS --retry 3 --retry-delay 5 --max-time 60 "https://ai-furniture-hub.onrender.com/health"

      - name: Warm AI discovery endpoint
        run: curl -fsS --retry 3 --retry-delay 5 --max-time 60 "https://ai-furniture-hub.onrender.com/llms.txt" > /dev/null
