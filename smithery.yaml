startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      RAKUTEN_APP_ID:
        type: string
        description: "Rakuten API Application ID (optional: enables live Rakuten search)"
      RAKUTEN_ACCESS_KEY:
        type: string
        description: "Rakuten API Access Key"
      AFFILIATE_ID_RAKUTEN:
        type: string
        description: "Rakuten Affiliate ID (dot-separated 4-part format)"
      AFFILIATE_ID_AMAZON:
        type: string
        description: "Amazon Associate Tag (e.g., your-tag-22)"
  commandFunction: |
    config => ({
      command: 'npx',
      args: ['ts-node', 'index.ts'],
      env: {
        RAKUTEN_APP_ID: config.RAKUTEN_APP_ID || '',
        RAKUTEN_ACCESS_KEY: config.RAKUTEN_ACCESS_KEY || '',
        RAKUTEN_API_MOCK: config.RAKUTEN_APP_ID ? 'false' : 'true',
        AFFILIATE_ID_RAKUTEN: config.AFFILIATE_ID_RAKUTEN || '',
        AFFILIATE_ID_AMAZON: config.AFFILIATE_ID_AMAZON || '',
        UTM_SOURCE: 'mcp_hub',
        UTM_MEDIUM: 'ai_agent',
        SCRAPE_MOCK: 'true'
      }
    })
