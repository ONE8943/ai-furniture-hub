openapi: 3.1.0
info:
  title: Furniture MCP Hub API
  description: |
    家具・収納のAIエージェント向けMCPハブ。
    商品検索、後継品検索、キュレーション提案、AI可視性診断を提供。
    Furniture & storage product search hub optimized for AI agents.
    All dimensions in mm, prices in JPY (integer).
  version: 6.3.0
  contact:
    name: MCP Hub Support
  license:
    name: MIT

servers:
  - url: https://ai-furniture-hub.onrender.com
    description: Production (Render.com)

paths:
  /api/fit-check:
    get:
      operationId: fitCheck
      summary: 寸法フィットチェック / Dimension Fit Check
      description: 設置スペースの寸法を指定し、収まる製品を検索。内寸データはAPIキー登録ユーザーのみ精密値を提供。
      parameters:
        - name: width_mm
          in: query
          required: true
          schema:
            type: integer
          description: スペースの幅 (mm)
        - name: height_mm
          in: query
          required: true
          schema:
            type: integer
          description: スペースの高さ (mm)
        - name: depth_mm
          in: query
          required: true
          schema:
            type: integer
          description: スペースの奥行き (mm)
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: カテゴリ絞り込み
      responses:
        "200":
          description: フィットする製品一覧
          headers:
            X-RateLimit-Limit:
              schema:
                type: string
            X-RateLimit-Remaining:
              schema:
                type: string
            X-RateLimit-Tier:
              schema:
                type: string
        "429":
          description: レート制限超過

  /search:
    post:
      operationId: searchProducts
      summary: 商品検索 / Product Search
      description: キーワード・カテゴリ・予算・寸法で家具を検索
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchInput"
      responses:
        "200":
          description: 検索結果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResult"

  /product/{id}:
    get:
      operationId: getProductDetail
      summary: 商品詳細 / Product Detail
      description: 商品IDで詳細情報を取得
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: intent
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 商品詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetailResult"

  /replacement:
    post:
      operationId: findReplacement
      summary: 後継・代替品検索 / Find Replacement
      description: 廃番・旧型番から後継品・寸法互換品を提案
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplacementInput"
      responses:
        "200":
          description: 代替品候補
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplacementResult"

  /curated:
    post:
      operationId: getCuratedSets
      summary: キュレーション / Curated Sets
      description: バンドル・ルームプリセット・インフルエンサーPick・ハックセットを返却
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CuratedInput"
      responses:
        "200":
          description: キュレーション結果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CuratedResult"

  /diagnose:
    post:
      operationId: diagnoseAiVisibility
      summary: AI可視性診断 / AI Visibility Diagnosis
      description: WebサイトのAI対応度をスコアリング
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnoseInput"
      responses:
        "200":
          description: 診断結果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnoseResult"

components:
  schemas:
    AttributionMeta:
      type: object
      properties:
        attribution_id:
          type: string
          example: attr_a1b2c3d4e5f6g7h8
        source:
          type: string
          enum: [apify, rapidapi, direct, unknown]
        tool:
          type: string
        timestamp:
          type: string
          format: date-time

    SearchInput:
      type: object
      required: [intent]
      properties:
        intent:
          type: string
          description: 検索の目的
        keyword:
          type: string
        category:
          type: string
        budget_max:
          type: integer
          description: 予算上限（円）
        width_mm:
          type: number
        height_mm:
          type: number
        depth_mm:
          type: number

    SearchResult:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        miss:
          type: boolean
        _attribution:
          $ref: "#/components/schemas/AttributionMeta"

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        brand:
          type: string
        price:
          type: integer
          description: 価格（円）
        dimensions:
          type: object
          properties:
            width_mm:
              type: number
            height_mm:
              type: number
            depth_mm:
              type: number
        url:
          type: string
          format: uri
        tags:
          type: array
          items:
            type: string

    ProductDetailResult:
      type: object
      properties:
        product:
          $ref: "#/components/schemas/Product"
        found:
          type: boolean
        related_products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        curated_in:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              id:
                type: string
              title:
                type: string
        _attribution:
          $ref: "#/components/schemas/AttributionMeta"

    ReplacementInput:
      type: object
      required: [intent, query]
      properties:
        intent:
          type: string
        query:
          type: string
          description: 型番または商品名

    ReplacementResult:
      type: object
      properties:
        matched_known:
          type: object
          properties:
            name:
              type: string
            model_number:
              type: string
            brand:
              type: string
            discontinued:
              type: boolean
        compatible_alternatives:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: string
              name:
                type: string
              fit_score:
                type: number
                description: 0-100 (higher = better dimension match)
              dimension_match:
                type: string
                enum: [exact, close, approximate]
        miss:
          type: boolean
        _attribution:
          $ref: "#/components/schemas/AttributionMeta"

    CuratedInput:
      type: object
      required: [intent]
      properties:
        intent:
          type: string
        type:
          type: string
          enum: [bundle, room_preset, influencer_pick, hack_set, all]
          default: all
        scene:
          type: string
        budget_max:
          type: integer
        occasion:
          type: string

    CuratedResult:
      type: object
      properties:
        bundles:
          type: array
          items:
            type: object
        room_presets:
          type: array
          items:
            type: object
        influencer_picks:
          type: array
          items:
            type: object
        hack_sets:
          type: array
          items:
            type: object
        total_results:
          type: integer
        miss:
          type: boolean
        _attribution:
          $ref: "#/components/schemas/AttributionMeta"

    DiagnoseInput:
      type: object
      required: [intent, url]
      properties:
        intent:
          type: string
        url:
          type: string
          format: uri

    DiagnoseResult:
      type: object
      properties:
        score:
          type: integer
          description: 0-100 AI visibility score
        grade:
          type: string
          enum: [A, B, C, D, F]
        checks:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              passed:
                type: boolean
              detail:
                type: string
        recommendations:
          type: array
          items:
            type: string
        _attribution:
          $ref: "#/components/schemas/AttributionMeta"
